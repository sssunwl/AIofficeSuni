<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suniverse Virtual Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #0D1117;
  font-family: 'Press Start 2P', monospace;
  color: #F0EAE0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

#hdr {
  padding: 18px 16px 10px;
  text-align: center;
}
.htitle { font-size: 13px; color: #C8956A; letter-spacing: .1em; }
.hsub   { font-size: 7px;  color: #3A6A9A; margin-top: 5px; letter-spacing: .18em; }
.hlive  {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 7px; color: #4CAF50; margin-top: 8px; letter-spacing: .1em;
}
.hdot { width:6px; height:6px; border-radius:50%; background:#4CAF50; animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

#wrap {
  position: relative;
  border: 3px solid #1E3A5F;
  box-shadow: 0 0 0 2px #C8956A, 0 0 30px rgba(200,149,106,.25);
  margin-bottom: 12px;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── PANEL ── */
#panel {
  position: fixed;
  top: 0; right: -390px;
  width: 370px; height: 100vh;
  background: #0D1117;
  border-left: 3px solid #1E3A5F;
  box-shadow: -4px 0 20px rgba(30,58,95,.5);
  transition: right .25s ease;
  z-index: 20;
  display: flex; flex-direction: column;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}
#panel.open { right: 0; }

.ph {
  padding: 14px 14px 12px;
  border-bottom: 2px solid #1E3A5F;
  background: #161B22;
  display: flex; align-items: center; gap: 10px;
}
.ph-em  { font-size: 26px; flex-shrink:0; }
.ph-inf { flex:1; }
.ph-nm  { font-family:'Press Start 2P',monospace; font-size:9px; color:#C8956A; }
.ph-rl  { font-size:11px; color:#5A7A9A; margin-top:4px; }
.ph-cl  {
  background:none; border:1px solid #1E3A5F; color:#5A7A9A;
  width:28px; height:28px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:sans-serif;
}
.ph-cl:hover { border-color:#C8956A; color:#C8956A; }

.pb { flex:1; overflow-y:auto; padding:12px; }
.pb::-webkit-scrollbar { width:3px; }
.pb::-webkit-scrollbar-thumb { background:#1E3A5F; }

.cv {
  background:#161B22; border:1px solid #1E3A5F; border-radius:6px;
  padding:11px 12px; margin-bottom:9px;
}
.cv-m {
  font-size:10px; color:#3A5A7A; margin-bottom:7px;
  display:flex; justify-content:space-between;
}
.cv-w { color:#C8956A; font-weight:700; }
.turn { margin-bottom:5px; }
.tn   { font-size:10px; font-weight:700; color:#4A9FD4; margin-bottom:2px; }
.tn.s { color:#C8956A; }
.tt   { font-size:12px; color:#C8C0B8; line-height:1.55; }

.empty {
  text-align:center; padding:36px 16px;
  color:#3A5A7A; font-size:12px; line-height:2.2;
  font-family:sans-serif;
}

#ov {
  display:none; position:fixed; inset:0;
  background:rgba(13,17,23,.5); z-index:19;
}
#ov.show { display:block; }

#ft {
  font-size:6px; color:#2A4A6A;
  letter-spacing:.14em; padding:6px 0 10px;
  text-align:center;
}
</style>
</head>
<body>

<div id="hdr">
  <div class="htitle">✦ SUNIVERSE VIRTUAL OFFICE ✦</div>
  <div class="hsub">A UNIVERSE BUILT BY S · PHASE II</div>
  <div class="hlive"><span class="hdot"></span>LIVE · CLICK ANY AGENT TO VIEW CHATS</div>
</div>

<div id="wrap"><canvas id="game"></canvas></div>
<div id="ft" id="rft">—</div>

<div id="ov" onclick="closePanel()"></div>
<div id="panel">
  <div class="ph">
    <span class="ph-em" id="pem">☀️</span>
    <div class="ph-inf">
      <div class="ph-nm" id="pnm">—</div>
      <div class="ph-rl" id="prl">—</div>
    </div>
    <button class="ph-cl" onclick="closePanel()">✕</button>
  </div>
  <div class="pb" id="pb"></div>
</div>

<script>
// ══════════════════════════════
// CONFIG
// ══════════════════════════════
const TS  = 32;   // tile size px
const TW  = 30;   // tiles wide
const TH  = 18;   // tiles tall
const CW  = TW*TS; // 960
const CH  = TH*TS; // 576

const canvas = document.getElementById('game');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ══════════════════════════════
// ZONES
// ══════════════════════════════
const Z = {
  cafe:    {x:0,  y:5,  w:6,  h:9,  floor:'#F2E2B8', label:'☕ Café'},
  office:  {x:6,  y:5,  w:18, h:9,  floor:'#EDEAE0', label:'💻 Open Office'},
  quiet:   {x:24, y:5,  w:6,  h:9,  floor:'#D0D8E8', label:'🌙 Sanctuary'},
  gym:     {x:6,  y:0,  w:8,  h:5,  floor:'#C8E4C0', label:'🏋️ Zen Gym'},
  conf:    {x:14, y:0,  w:8,  h:5,  floor:'#C8D8EE', label:'🗓 Conference'},
  lounge:  {x:22, y:0,  w:8,  h:5,  floor:'#EEE0CC', label:'🌿 Lounge'},
  ceo:     {x:6,  y:14, w:12, h:4,  floor:'#1A3358', label:'☀️ CEO Suite'},
  founder: {x:18, y:14, w:12, h:4,  floor:'#28180A', label:'🌊 Founder Studio'},
};

// tile-zone lookup table
const zoneMap = Array.from({length:TH},()=>Array(TW).fill(null));
for(const[k,z] of Object.entries(Z))
  for(let ty=z.y;ty<z.y+z.h;ty++)
    for(let tx=z.x;tx<z.x+z.w;tx++)
      if(ty<TH&&tx<TW) zoneMap[ty][tx]=k;

function rndInZone(name){
  const z=Z[name], p=1.2;
  return {
    x:(z.x+p+Math.random()*(z.w-p*2))*TS,
    y:(z.y+p+Math.random()*(z.h-p*2))*TS+TS*.6
  };
}

// ══════════════════════════════
// AGENTS
// ══════════════════════════════
const ADEFS=[
  {name:'Sun',      role:'CEO',              emoji:'☀️', kw:'Vision · Light',
   hair:'#B86800',skin:'#F0B870',top:'#1E3A5F',bot:'#142848',
   prefer:['ceo'],     wander:['office','conf','lounge']},

  {name:'Sterling', role:'CFO',              emoji:'💰', kw:'Precision · Stability',
   hair:'#787878',skin:'#EDD8C0',top:'#3A3A4C',bot:'#252530',
   prefer:['office'],   wander:['conf','cafe','ceo']},

  {name:'Steve',    role:'AI技術長',          emoji:'🤖', kw:'Intelligence · Future',
   hair:'#1A1A2A',skin:'#CCA070',top:'#1A4A8A',bot:'#0E2A4A',
   prefer:['office'],   wander:['conf','gym','lounge']},

  {name:'Stephanie',role:'創意策略總監',      emoji:'💡', kw:'Curiosity · Strategy',
   hair:'#6A2880',skin:'#EEC098',top:'#7A3A9A',bot:'#4A1860',
   prefer:['office','lounge'], wander:['cafe','conf','quiet']},

  {name:'Scott',    role:'內容文字總監',      emoji:'✍️', kw:'Wit · Culture',
   hair:'#4A2810',skin:'#D09870',top:'#6A4828',bot:'#3C2818',
   prefer:['office','cafe'], wander:['lounge','quiet','conf']},

  {name:'Sunny',    role:'設計總監',          emoji:'🎨', kw:'Aesthetic · Order',
   hair:'#D87020',skin:'#F0C898',top:'#D86030',bot:'#903818',
   prefer:['office','quiet'], wander:['cafe','lounge','conf']},

  {name:'Sona',     role:'行銷社媒總監',      emoji:'📣', kw:'Energy · Connection',
   hair:'#801010',skin:'#E8A070',top:'#C02828',bot:'#780F0F',
   prefer:['office','lounge'], wander:['cafe','conf','gym']},

  {name:'Sosol',    role:'旅遊平台經理',      emoji:'✈️', kw:'Wanderlust · Discovery',
   hair:'#103820',skin:'#C08050',top:'#1A6858',bot:'#0A3830',
   prefer:['office','lounge','cafe'], wander:['gym','quiet','conf']},

  {name:'Sean',     role:'收藏品研究員',      emoji:'🎯', kw:'Instinct · Hustle',
   hair:'#101010',skin:'#C89060',top:'#304020',bot:'#1A2810',
   prefer:['office','quiet'], wander:['cafe','lounge','gym']},

  {name:'Saki',     role:'潛水専家',          emoji:'🤿', kw:'Depth · Calm',
   hair:'#C09830',skin:'#BE7238',top:'#186898',bot:'#083048',
   prefer:['gym','office'], wander:['lounge','cafe','quiet']},

  {name:'Scarlett', role:'香氛感官研究員',    emoji:'🕯️', kw:'Sensation · Craft',
   hair:'#580808',skin:'#EEC8A8',top:'#7A1828',bot:'#480A18',
   prefer:['quiet','office'], wander:['cafe','lounge','conf']},

  {name:'Souling',  role:'身心靈專家',        emoji:'🔮', kw:'Intuition · Healing',
   hair:'#2A0860',skin:'#CC9880',top:'#3A0870',bot:'#200448',
   prefer:['quiet'],     wander:['lounge','cafe','gym']},

  {name:'Summer',   role:'健康美容專家',      emoji:'🌸', kw:'Wellness · Glow',
   hair:'#D87888',skin:'#F4D0C0',top:'#C06080',bot:'#803050',
   prefer:['gym','office'], wander:['cafe','lounge','quiet']},
];

const agents = ADEFS.map((d,i)=>{
  const sp=d.prefer[0];
  const p=rndInZone(sp);
  return{...d,
    x:p.x,y:p.y,tx:p.x,ty:p.y,
    state:'idle',
    idleT:80+Math.random()*160,
    wFrame:0,wTick:0,
    bPhase:i*0.72,bY:0,
    facing:1 // 1=right -1=left
  };
});

// ══════════════════════════════
// SPRITE LOADING
// ══════════════════════════════
const FW=48, FH=48;   // source frame size
const DW=64, DH=64;   // display size (scaled up for clarity)
const SPRITES={};
agents.forEach(ag=>{
  const img=new Image();
  img.src=`assets/characters/agents/${ag.name}.png`;
  SPRITES[ag.name]=img;
});

// ── Tile Sheets ──
const T={};
['1_Generic_32x32','2_LivingRoom_32x32','8_Gym_32x32','13_Conference_Hall_32x32'].forEach(n=>{
  const img=new Image(); img.src=`assets/tiles/${n}.png`; T[n]=img;
});

// ══════════════════════════════
// LOG DATA
// ══════════════════════════════
const LOG_URL='https://raw.githubusercontent.com/sssunwl/AIofficeSuni/main/office_log.json';
let logData=[];
let activeName=null;

async function fetchLog(){
  try{
    const r=await fetch(LOG_URL+'?t='+Date.now());
    logData=await r.json();
    document.getElementById('rft').textContent=
      'LAST UPDATE: '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){}
}

// ══════════════════════════════
// MAP RENDERING
// ══════════════════════════════
// Precompute static map once
let staticMapCanvas=null;
function buildStaticMap(){
  const sc=document.createElement('canvas');
  sc.width=CW; sc.height=CH;
  const sx=sc.getContext('2d');
  sx.imageSmoothingEnabled=false;

  // wall background
  sx.fillStyle='#08080F';
  sx.fillRect(0,0,CW,CH);

  // zone floors
  for(const[,z] of Object.entries(Z)){
    sx.fillStyle=z.floor;
    sx.fillRect(z.x*TS,z.y*TS,z.w*TS,z.h*TS);
    // tile grid lines
    sx.strokeStyle='rgba(0,0,0,0.07)';
    sx.lineWidth=1;
    for(let ty=z.y;ty<z.y+z.h;ty++)
      for(let tx=z.x;tx<z.x+z.w;tx++)
        sx.strokeRect(tx*TS+.5,ty*TS+.5,TS-1,TS-1);
  }

  // zone labels
  sx.font='bold 8px monospace';
  sx.textAlign='left';
  for(const[,z] of Object.entries(Z)){
    const dark=z.floor==='#1A3358'||z.floor==='#28180A';
    sx.fillStyle=dark?'rgba(200,200,200,0.55)':'rgba(30,58,95,0.45)';
    sx.fillText(z.label,z.x*TS+5,z.y*TS+13);
  }

  // ── HELPERS ──
  function plant(px,py){
    sx.fillStyle='#7A3510'; sx.fillRect(px+5,py+18,7,7);
    sx.fillStyle='#1E4A1A'; sx.fillRect(px+7,py+8,3,12);
    sx.fillStyle='#2A6A24'; sx.fillRect(px+1,py+4,14,10);
    sx.fillStyle='#38882E'; sx.fillRect(px+4,py,10,8);
    sx.fillStyle='#308028'; sx.fillRect(px+2,py+8,6,8);
  }
  function palm(px,py){
    sx.fillStyle='#7A4820'; sx.fillRect(px+13,py+22,5,26);
    sx.fillStyle='#2A6820'; sx.fillRect(px-2,py+8,18,10);
    sx.fillStyle='#389030'; sx.fillRect(px+4,py+2,18,10);
    sx.fillStyle='#44A838'; sx.fillRect(px+10,py-2,14,8);
    sx.fillStyle='#2A6820'; sx.fillRect(px+14,py+6,14,8);
  }
  function desk(tx,ty){
    const x=tx*TS,y=ty*TS;
    sx.fillStyle='rgba(0,0,0,.14)'; sx.fillRect(x+2,y+11,TS-2,TS-10);
    sx.fillStyle='#BCA870'; sx.fillRect(x+1,y+8,TS-2,TS-10);
    sx.fillStyle='#D4BC88'; sx.fillRect(x+1,y+8,TS-2,5);
    sx.fillStyle='#9A8448'; sx.fillRect(x+2,y+29,4,3);
    sx.fillStyle='#9A8448'; sx.fillRect(x+TS-6,y+29,4,3);
    sx.fillStyle='#1A2230'; sx.fillRect(x+8,y-8,16,12);
    sx.fillStyle='#3A6A9A'; sx.fillRect(x+9,y-7,14,9);
    sx.fillStyle='rgba(80,160,220,.3)'; sx.fillRect(x+9,y-7,14,9);
    sx.fillStyle='#182020'; sx.fillRect(x+13,y+3,6,5);
    sx.fillStyle='#C8C0B0'; sx.fillRect(x+4,y+9,16,3);
  }

  // ── GYM (6-13 × 0-4) ──
  for(let r=0;r<5;r++) for(let c=6;c<14;c++){
    sx.fillStyle=(r+c)%2===0?'#1A1A1A':'#1E1E1E';
    sx.fillRect(c*TS,r*TS,TS,TS);
  }
  // mirror on wall
  sx.fillStyle='#B8C8CC'; sx.fillRect(7*TS,0,5*TS,6);
  sx.fillStyle='rgba(200,230,240,.15)'; sx.fillRect(7*TS,0,5*TS,6);
  // yoga mats
  [[7,2,'#A02828'],[9,2,'#1A4890'],[11,2,'#1A7030']].forEach(([tx,ty,c])=>{
    sx.fillStyle=c; sx.fillRect(tx*TS+3,ty*TS+4,TS-6,TS+8);
    sx.fillStyle='rgba(255,255,255,.18)'; sx.fillRect(tx*TS+3,ty*TS+4,TS-6,3);
  });
  // treadmill
  sx.fillStyle='#1C2818'; sx.fillRect(12*TS+2,TS+2,TS+12,TS-6);
  sx.fillStyle='#263C22'; sx.fillRect(12*TS+4,TS+6,TS+8,16);
  sx.fillStyle='#C03818'; sx.fillRect(12*TS+18,TS,16,6);
  // dumbbell rack
  sx.fillStyle='#141414'; sx.fillRect(6*TS+4,4,42,22);
  sx.fillStyle='#202020'; sx.fillRect(6*TS+4,4,42,6);
  ['#D02020','#2060B8','#20A038','#C09010','#9020A0'].forEach((c,i)=>{
    sx.fillStyle=c; sx.fillRect(6*TS+6+i*8,7,6,14);
    sx.fillStyle='rgba(255,255,255,.25)'; sx.fillRect(6*TS+6+i*8,7,6,3);
  });

  // ── CONFERENCE (14-21 × 0-4) ──
  for(let r=0;r<5;r++) for(let c=14;c<22;c++){
    sx.fillStyle=(r+c)%2===0?'#CAD4E0':'#C2CCDA';
    sx.fillRect(c*TS,r*TS,TS,TS);
  }
  // projector screen
  sx.fillStyle='#E8EEF4'; sx.fillRect(14*TS+40,4,5*TS-20,22);
  sx.fillStyle='#D8E4EC'; sx.fillRect(14*TS+42,6,5*TS-24,16);
  sx.fillStyle='#909090'; sx.fillRect(14*TS+100,0,12,6);
  // conference table
  const ctX=14*TS+20, ctY=TS;
  sx.fillStyle='rgba(0,0,0,.2)'; sx.fillRect(ctX+4,ctY+4,164,68);
  sx.fillStyle='#6B4220'; sx.fillRect(ctX,ctY,164,68);
  sx.fillStyle='#7E5230'; sx.fillRect(ctX,ctY,164,14);
  sx.fillStyle='#C8956A'; sx.fillRect(ctX+62,ctY+28,40,5);
  sx.fillStyle='rgba(200,149,106,.1)'; sx.fillRect(ctX,ctY,164,68);
  // chairs top
  [ctX+8,ctX+42,ctX+78,ctX+114,ctX+142].forEach(cx=>{
    sx.fillStyle='#283858'; sx.fillRect(cx,ctY-12,20,12);
    sx.fillStyle='#3A5080'; sx.fillRect(cx,ctY-12,20,5);
  });
  // chairs bottom
  [ctX+8,ctX+42,ctX+78,ctX+114,ctX+142].forEach(cx=>{
    sx.fillStyle='#283858'; sx.fillRect(cx,ctY+70,20,12);
    sx.fillStyle='#3A5080'; sx.fillRect(cx,ctY+70,20,5);
  });
  // whiteboard
  sx.fillStyle='#FFFFFF'; sx.fillRect(21*TS+2,TS,22,50);
  sx.fillStyle='#EAF0F6'; sx.fillRect(21*TS+3,TS+1,20,48);
  sx.strokeStyle='#B8C8D8'; sx.lineWidth=1;
  [12,22,32].forEach(dy=>{ sx.beginPath(); sx.moveTo(21*TS+5,TS+dy); sx.lineTo(21*TS+21,TS+dy); sx.stroke(); });

  // ── LOUNGE (22-29 × 0-4) ──
  for(let r=0;r<5;r++) for(let c=22;c<30;c++){
    sx.fillStyle=c%2===0?'#C8A868':'#B89858';
    sx.fillRect(c*TS,r*TS,TS,TS);
  }
  // L-sofa
  const sx0=22*TS+4;
  sx.fillStyle='rgba(0,0,0,.18)'; sx.fillRect(sx0+4,TS+26,124,44);
  sx.fillStyle='#8090A8'; sx.fillRect(sx0,TS+22,124,42);
  sx.fillStyle='#9AAAC0'; sx.fillRect(sx0,TS+22,124,12);
  sx.fillStyle='#6878A0'; sx.fillRect(sx0,TS+60,124,4);
  [sx0+8,sx0+44,sx0+80].forEach(cx=>{
    sx.fillStyle='#8898B4'; sx.fillRect(cx,TS+30,28,18);
    sx.fillStyle='#A8B8CC'; sx.fillRect(cx,TS+30,28,6);
  });
  // side arm of L
  sx.fillStyle='#8090A8'; sx.fillRect(sx0,3*TS,50,42);
  sx.fillStyle='#9AAAC0'; sx.fillRect(sx0,3*TS,50,12);
  // coffee table
  sx.fillStyle='rgba(0,0,0,.15)'; sx.fillRect(22*TS+136,TS+28,52,38);
  sx.fillStyle='#A87840'; sx.fillRect(22*TS+134,TS+24,52,38);
  sx.fillStyle='#C09050'; sx.fillRect(22*TS+134,TS+24,52,8);
  // plants & shelf
  palm(29*TS-24,4);
  plant(22*TS+4,4);
  sx.fillStyle='#2A2018'; sx.fillRect(29*TS-2,0,28,4*TS+4);
  ['#C83030','#2860D0','#28B040','#D0A020','#9030C0','#28A0A0','#D06020'].forEach((c,i)=>{
    sx.fillStyle=c; sx.fillRect(29*TS-1,2+i*18,6,14);
  });

  // ── CAFÉ (0-5 × 5-13) ──
  for(let r=5;r<14;r++){
    sx.fillStyle=r%2===0?'#D4A868':'#C89858';
    sx.fillRect(0,r*TS,6*TS,TS);
  }
  // counter
  sx.fillStyle='rgba(0,0,0,.2)'; sx.fillRect(0,5*TS+3,6*TS,26);
  sx.fillStyle='#6B3A18'; sx.fillRect(0,5*TS,6*TS,24);
  sx.fillStyle='#7E4820'; sx.fillRect(0,5*TS,6*TS,8);
  // coffee machine
  sx.fillStyle='#181818'; sx.fillRect(2*TS+4,5*TS+8,24,14);
  sx.fillStyle='#282828'; sx.fillRect(2*TS+6,5*TS+9,20,10);
  sx.fillStyle='#E0A030'; sx.fillRect(2*TS+8,5*TS+12,6,5);
  sx.fillStyle='#C0C0B8'; sx.fillRect(2*TS+16,5*TS+14,8,4);
  // chalkboard
  sx.fillStyle='#1A2818'; sx.fillRect(4*TS+2,5*TS+3,TS+14,22);
  sx.fillStyle='#223020'; sx.fillRect(4*TS+3,5*TS+4,TS+12,20);
  sx.strokeStyle='rgba(200,200,180,.45)'; sx.lineWidth=.8;
  [9,14,19].forEach(dy=>{ sx.beginPath(); sx.moveTo(4*TS+5,5*TS+dy); sx.lineTo(4*TS+TS+13,5*TS+dy); sx.stroke(); });

  // meditation cushions
  [[26,10],[27,10],[25,12],[28,11]].forEach(([tx,ty])=>{

  // lamp

}

function pxPlant(sx,x,y){
  sx.fillStyle='#7A3510'; sx.fillRect(x+2,y+16,10,10);
  sx.fillStyle='#2A6A2A'; sx.fillRect(x+5,y+6,4,14);
  sx.fillStyle='#3A8A3A'; sx.fillRect(x-2,y+2,12,10);
  sx.fillStyle='#3A8A3A'; sx.fillRect(x+4,y-2,8,8);
  sx.fillStyle='#288028'; sx.fillRect(x+3,y+5,5,5);
}

// ══════════════════════════════
// CHARACTER RENDERING
// ══════════════════════════════
function drawAgent(ag,hl){
  const x=Math.round(ag.x), y=Math.round(ag.y+ag.bY);
  const img=SPRITES[ag.name];

  // shadow
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();
  ctx.ellipse(x,y+3,11,4,0,0,Math.PI*2);
  ctx.fill();

  // selection ring
  if(hl){
    ctx.strokeStyle='#C8956A'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.ellipse(x,y+3,14,6,0,0,Math.PI*2);
    ctx.stroke();
  }

  if(img&&img.complete&&img.naturalWidth>0){
    // ── SPRITE RENDERING ──
    const isWalk=ag.state==='walking';
    // Row 0 = walk-south (front-facing). Always use this row so characters face viewer.
    const sy=0;
    const frameIdx=isWalk?Math.floor(Date.now()/130)%4:0;
    const sx=frameIdx*FW;

    const drawX=x-DW/2;
    const drawY=y-DH+4;

    if(ag.facing===-1){
      ctx.save();
      ctx.translate(drawX+DW,drawY);
      ctx.scale(-1,1);
      ctx.drawImage(img,sx,sy,FW,FH,0,0,DW,DH);
      ctx.restore();
    } else {
      ctx.drawImage(img,sx,sy,FW,FH,drawX,drawY,DW,DH);
    }
  } else {
    // ── FALLBACK (sprite not yet loaded) ──
    const wf=ag.state==='walking'&&ag.wFrame===1;
    ctx.fillStyle=ag.hair;
    ctx.fillRect(x-7,y-46,14,11);
    ctx.fillStyle=ag.skin;
    ctx.fillRect(x-7,y-35,14,14);
    ctx.fillStyle='#14141E';
    ctx.fillRect(x-4,y-29,3,3);
    ctx.fillRect(x+1,y-29,3,3);
    ctx.fillStyle=ag.top;
    ctx.fillRect(x-8,y-21,16,16);
    ctx.fillRect(x-12,y-21,4,10);
    ctx.fillRect(x+8,y-21,4,10);
    ctx.fillStyle=ag.bot;
    const l=wf?3:0,r=wf?0:3;
    ctx.fillRect(x-7,y-5+l,6,11);
    ctx.fillRect(x+1,y-5+r,6,11);
  }

  // NAME TAG
  ctx.font='bold 8px monospace';
  ctx.textAlign='center';
  const lw=ctx.measureText(ag.name).width;
  ctx.fillStyle=hl?'rgba(13,17,23,.92)':'rgba(13,17,23,.75)';
  ctx.fillRect(x-lw/2-4,y-DH-10,lw+8,12);
  ctx.fillStyle=hl?'#C8956A':'#C8C0B0';
  ctx.fillText(ag.name,x,y-DH);
}

// ══════════════════════════════
// AGENT AI
// ══════════════════════════════
const SPD=1.3;

function tickAgent(ag){
  if(ag.state==='idle'){
    ag.bY=Math.sin(Date.now()/480+ag.bPhase)*1.8;
    if(--ag.idleT<=0) setTarget(ag);
  } else {
    ag.bY=0;
    const dx=ag.tx-ag.x, dy=ag.ty-ag.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<SPD){
      ag.x=ag.tx; ag.y=ag.ty;
      ag.state='idle';
      ag.idleT=120+Math.random()*220;
    } else {
      ag.x+=dx/d*SPD; ag.y+=dy/d*SPD;
      ag.facing=dx>0?1:-1;
    }
    if(++ag.wTick%13===0) ag.wFrame^=1;
  }
}

function setTarget(ag){
  const pool=Math.random()<.65?ag.prefer:ag.wander;
  const zone=pool[Math.floor(Math.random()*pool.length)];
  const p=rndInZone(zone);
  ag.tx=p.x; ag.ty=p.y;
  ag.state='walking'; ag.wFrame=0; ag.wTick=0;
}

// ══════════════════════════════
// CLICK & HOVER
// ══════════════════════════════
function hitTest(mx,my){
  for(const ag of agents){
    const dx=mx-ag.x, dy=my-(ag.y+ag.bY);
    if(Math.abs(dx)<DW/2&&dy>-DH&&dy<6) return ag;
  }
  return null;
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const ag=hitTest(e.clientX-r.left,e.clientY-r.top);
  if(ag) openPanel(ag);
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  canvas.style.cursor=hitTest(e.clientX-r.left,e.clientY-r.top)?'pointer':'default';
});

// ══════════════════════════════
// PANEL
// ══════════════════════════════
function openPanel(ag){
  activeName=ag.name;
  document.getElementById('pem').textContent=ag.emoji;
  document.getElementById('pnm').textContent=ag.name;
  document.getElementById('prl').textContent=ag.role+' · '+ag.kw;

  const convs=logData.filter(e=>e.participants&&e.participants.includes(ag.name));
  const pb=document.getElementById('pb');

  if(!convs.length){
    pb.innerHTML=`<div class="empty">${ag.emoji}<br><br>${ag.name} 還沒有對話記錄。<br>等下一次 15 分鐘觸發後再來看。</div>`;
  } else {
    pb.innerHTML=convs.map(e=>{
      const other=e.participants.find(n=>n!==ag.name)||'';
      const odef=ADEFS.find(a=>a.name===other)||{emoji:'👤'};
      const dt=new Date(e.time);
      const ds=dt.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
      const ts=dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      const turns=(e.turns||[]).map(t=>`
        <div class="turn">
          <div class="tn ${t.agent===ag.name?'s':''}">${t.agent}</div>
          <div class="tt">${esc(t.text)}</div>
        </div>`).join('');
      return`<div class="cv">
        <div class="cv-m"><span class="cv-w">${odef.emoji} 與 ${other}</span><span>${ds} ${ts}</span></div>
        ${turns}</div>`;
    }).join('');
  }

  document.getElementById('panel').classList.add('open');
  document.getElementById('ov').classList.add('show');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('ov').classList.remove('show');
  activeName=null;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════
// GAME LOOP
// ══════════════════════════════
function loop(){
  if(staticMapCanvas) ctx.drawImage(staticMapCanvas,0,0);

  agents.forEach(tickAgent);
  [...agents].sort((a,b)=>a.y-b.y)
    .forEach(ag=>drawAgent(ag,ag.name===activeName));

  requestAnimationFrame(loop);
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
buildStaticMap(); // immediate pass (tiles may not be ready)
fetchLog();
setInterval(fetchLog,5*60*1000);
loop();
// Rebuild once tile sheets are loaded (adds gym mats, etc.)
Promise.all(Object.values(T).map(img=>new Promise(r=>{img.onload=r;img.onerror=r;}))).then(buildStaticMap);
</script>
