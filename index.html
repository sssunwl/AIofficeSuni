<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suniverse Virtual Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='sg' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='%23FFE066'/><stop offset='60%25' stop-color='%23F5A623'/><stop offset='100%25' stop-color='%23C0620A'/></radialGradient></defs><g transform='translate(16,16)'><line x1='0' y1='-14' x2='0' y2='-10' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='9.9' y1='-9.9' x2='7.1' y2='-7.1' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='14' y1='0' x2='10' y2='0' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='9.9' y1='9.9' x2='7.1' y2='7.1' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='0' y1='14' x2='0' y2='10' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='-9.9' y1='9.9' x2='-7.1' y2='7.1' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='-14' y1='0' x2='-10' y2='0' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><line x1='-9.9' y1='-9.9' x2='-7.1' y2='-7.1' stroke='%23FFD040' stroke-width='2.2' stroke-linecap='round'/><circle cx='1' cy='-1' r='8.5' fill='url(%23sg)'/><ellipse cx='-2' cy='-3' rx='4' ry='2.5' fill='rgba(255,255,220,0.35)'/></g></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0D1117;
  font-family:'Press Start 2P',monospace;
  color:#F0EAE0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
}
#hdr{padding:18px 16px 10px;text-align:center;}
.htitle{font-size:13px;color:#C8956A;letter-spacing:.1em;}
.hsub{font-size:7px;color:#3A6A9A;margin-top:5px;letter-spacing:.18em;}
.hlive{display:inline-flex;align-items:center;gap:5px;font-size:7px;color:#4CAF50;margin-top:8px;letter-spacing:.1em;}
.hdot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#wrap{
  position:relative;
  border:3px solid #1E3A5F;
  box-shadow:0 0 0 2px #C8956A,0 0 30px rgba(200,149,106,.25);
  transform-origin:top left;
}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#panel{
  position:fixed;top:0;right:-390px;
  width:370px;height:100vh;
  background:#0D1117;
  border-left:3px solid #1E3A5F;
  box-shadow:-4px 0 20px rgba(30,58,95,.5);
  transition:right .25s ease;z-index:20;
  display:flex;flex-direction:column;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
}
#panel.open{right:0;}
.ph{padding:14px 14px 12px;border-bottom:2px solid #1E3A5F;background:#161B22;display:flex;align-items:center;gap:10px;}
.ph-em{font-size:26px;flex-shrink:0;}
.ph-inf{flex:1;}
.ph-nm{font-family:'Press Start 2P',monospace;font-size:9px;color:#C8956A;}
.ph-rl{font-size:11px;color:#5A7A9A;margin-top:4px;}
.ph-cl{background:none;border:1px solid #1E3A5F;color:#5A7A9A;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;}
.ph-cl:hover{border-color:#C8956A;color:#C8956A;}
.pb{flex:1;overflow-y:auto;padding:12px;}
.pb::-webkit-scrollbar{width:3px;}
.pb::-webkit-scrollbar-thumb{background:#1E3A5F;}
.cv{background:#161B22;border:1px solid #1E3A5F;border-radius:6px;padding:11px 12px;margin-bottom:9px;}
.cv-m{font-size:10px;color:#3A5A7A;margin-bottom:7px;display:flex;justify-content:space-between;}
.cv-w{color:#C8956A;font-weight:700;}
.turn{margin-bottom:5px;}
.tn{font-size:10px;font-weight:700;color:#4A9FD4;margin-bottom:2px;}
.tn.s{color:#C8956A;}
.tt{font-size:12px;color:#C8C0B8;line-height:1.55;}
.empty{text-align:center;padding:36px 16px;color:#3A5A7A;font-size:12px;line-height:2.2;font-family:sans-serif;}
#ov{display:none;position:fixed;inset:0;background:rgba(13,17,23,.5);z-index:19;}
#ov.show{display:block;}
#ft{font-size:6px;color:#2A4A6A;letter-spacing:.14em;padding:6px 0 10px;text-align:center;}
</style>
</head>
<body>
<div id="hdr">
  <div class="htitle">✦ SUNIVERSE VIRTUAL OFFICE ✦</div>
  <div class="hsub">A UNIVERSE BUILT BY S · PHASE II</div>
  <div class="hlive"><span class="hdot"></span>LIVE · CLICK ANY AGENT TO VIEW CHATS</div>
</div>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="ft">—</div>
<div id="ov" onclick="closePanel()"></div>
<div id="panel">
  <div class="ph">
    <span class="ph-em" id="pem">☀️</span>
    <div class="ph-inf">
      <div class="ph-nm" id="pnm">—</div>
      <div class="ph-rl" id="prl">—</div>
    </div>
    <button class="ph-cl" onclick="closePanel()">✕</button>
  </div>
  <div class="pb" id="pb"></div>
</div>

<script>
// ══════════════════════════════
// CONFIG — vertical portrait layout
// ══════════════════════════════
const TS=32, TW=20, TH=31, CW=TW*TS, CH=TH*TS; // 640×992

const canvas=document.getElementById('game');
canvas.width=CW; canvas.height=CH;
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ══════════════════════════════
// ZONES
// ══════════════════════════════
const Z={
  // ── Top row ──
  gym:    {x:0, y:0,  w:7, h:4, floor:'#161616', label:'🏋️ Gym'},
  conf:   {x:7, y:0,  w:7, h:4, floor:'#C4CEDC', label:'📋 Conference'},
  lounge: {x:14,y:0,  w:6, h:4, floor:'#D8C89A', label:'🌿 Lounge'},
  // ── Open Office ──
  office: {x:0, y:4,  w:20,h:8, floor:'#ECEAE2', label:'💻 Open Office'},
  // ── CEO & SS Studio — below office, corridor (x:8-11) BETWEEN them ──
  ceo:    {x:0, y:12, w:8, h:4, floor:'#0D1D36', label:'☀️ CEO Suite'},
  studio: {x:12,y:12, w:8, h:4, floor:'#180E06', label:'🌊 SS Studio'},
  // ── Corridor — x:8-11, y:12-27 (connects CEO/SS row with all side rooms) ──
  corridor:{x:8,y:12, w:4, h:16, floor:'#0D0D1A', label:''},
  // ── Left rooms (x:0-7) ──
  cafe:   {x:0, y:16, w:8, h:3, floor:'#E8D4A0', label:'☕ Café'},
  kitchen:{x:0, y:19, w:8, h:3, floor:'#DFC99A', label:'🍱 Kitchen'},
  snack:  {x:0, y:22, w:8, h:3, floor:'#E2D8B2', label:'🍬 Social'},
  game:   {x:0, y:25, w:8, h:3, floor:'#C8DEC8', label:'🎮 Game Room'},
  theater:{x:0, y:28, w:10,h:3, floor:'#10101E', label:'🎬 Theater'},
  // ── Right rooms (x:12-19) ──
  souling:{x:12,y:16, w:8, h:3, floor:'#1C1030', label:'🔮 Souling'},
  consult:{x:12,y:19, w:8, h:3, floor:'#D0D8E8', label:'💬 Consulting'},
  aroma:  {x:12,y:22, w:8, h:3, floor:'#F0E8E0', label:'🕯️ Aroma Lab'},
  zen:    {x:12,y:25, w:8, h:3, floor:'#DFE8EC', label:'🌙 Zen Room'},
  meditate:{x:10,y:28,w:10,h:3, floor:'#0A1420', label:'🧘 Meditation'},
};

const zoneMap=Array.from({length:TH},()=>Array(TW).fill(null));
for(const[k,z] of Object.entries(Z))
  for(let ty=z.y;ty<z.y+z.h;ty++)
    for(let tx=z.x;tx<z.x+z.w;tx++)
      if(ty<TH&&tx<TW) zoneMap[ty][tx]=k;

function rndInZone(name){
  const z=Z[name];
  const px=Math.min(0.9,z.w*0.18),py=Math.min(0.9,z.h*0.18);
  return{
    x:(z.x+px+Math.random()*(z.w-px*2))*TS,
    y:(z.y+py+Math.random()*(z.h-py*2))*TS+TS*.6
  };
}

// ══════════════════════════════
// AGENTS — 12 desks (4 cols × 3 rows)
// ══════════════════════════════
const ADEFS=[
  {name:'Sun',      role:'CEO',           emoji:'☀️',kw:'Vision · Light',
   hair:'#B86800',skin:'#F0B870',top:'#1E3A5F',bot:'#142848',
   home:null,prefer:['ceo'],wander:['office','conf','lounge']},

  {name:'Sterling', role:'CFO',           emoji:'💰',kw:'Precision · Stability',
   hair:'#787878',skin:'#EDD8C0',top:'#3A3A4C',bot:'#252530',
   home:[1,7],prefer:['office'],wander:['conf','cafe','ceo']},

  {name:'Steve',    role:'AI技術長',      emoji:'🤖',kw:'Intelligence · Future',
   hair:'#1A1A2A',skin:'#CCA070',top:'#1A4A8A',bot:'#0E2A4A',
   home:[6,7],prefer:['office'],wander:['conf','gym','lounge']},

  {name:'Stephanie',role:'創意策略總監', emoji:'💡',kw:'Curiosity · Strategy',
   hair:'#6A2880',skin:'#EEC098',top:'#7A3A9A',bot:'#4A1860',
   home:[11,7],prefer:['office','lounge'],wander:['cafe','conf','zen']},

  {name:'Scott',    role:'內容文字總監', emoji:'✍️',kw:'Wit · Culture',
   hair:'#4A2810',skin:'#D09870',top:'#6A4828',bot:'#3C2818',
   home:[16,7],prefer:['office','cafe'],wander:['lounge','zen','conf']},

  {name:'Sunny',    role:'設計總監',      emoji:'🎨',kw:'Aesthetic · Order',
   hair:'#D87020',skin:'#F0C898',top:'#D86030',bot:'#903818',
   home:[1,9],prefer:['office','zen'],wander:['cafe','lounge','conf']},

  {name:'Sona',     role:'行銷社媒總監', emoji:'📣',kw:'Energy · Connection',
   hair:'#801010',skin:'#E8A070',top:'#C02828',bot:'#780F0F',
   home:[6,9],prefer:['office','lounge'],wander:['cafe','conf','gym']},

  {name:'Sosol',    role:'旅遊平台經理', emoji:'✈️',kw:'Wanderlust · Discovery',
   hair:'#103820',skin:'#C08050',top:'#1A6858',bot:'#0A3830',
   home:[11,9],prefer:['lounge','cafe'],wander:['gym','zen','conf']},

  {name:'Sean',     role:'收藏品研究員', emoji:'🎯',kw:'Instinct · Hustle',
   hair:'#101010',skin:'#C89060',top:'#304020',bot:'#1A2810',
   home:[16,9],prefer:['office','zen'],wander:['cafe','lounge','game']},

  {name:'Saki',     role:'潛水専家',      emoji:'🤿',kw:'Depth · Calm',
   hair:'#C09830',skin:'#BE7238',top:'#186898',bot:'#083048',
   home:[1,11],prefer:['gym','office'],wander:['lounge','cafe','zen']},

  {name:'Scarlett', role:'香氛感官研究員',emoji:'🕯️',kw:'Sensation · Craft',
   hair:'#580808',skin:'#EEC8A8',top:'#7A1828',bot:'#480A18',
   home:[6,11],prefer:['aroma','office'],wander:['cafe','lounge','zen']},

  {name:'Souling',  role:'身心靈専家',    emoji:'🔮',kw:'Intuition · Healing',
   hair:'#2A0860',skin:'#CC9880',top:'#3A0870',bot:'#200448',
   home:[11,11],prefer:['souling','meditate'],wander:['lounge','cafe','zen']},

  {name:'Summer',   role:'健康美容専家',  emoji:'🌸',kw:'Wellness · Glow',
   hair:'#D87888',skin:'#F4D0C0',top:'#C06080',bot:'#803050',
   home:[16,11],prefer:['gym','office'],wander:['cafe','lounge','zen']},
];

const agents=ADEFS.map((d,i)=>{
  let p;
  if(d.home){
    p={x:d.home[0]*TS+TS/2, y:d.home[1]*TS+TS*.8};
  } else {
    p=rndInZone(d.prefer[0]);
  }
  return{...d,x:p.x,y:p.y,tx:p.x,ty:p.y,
    state:'idle',idleT:300+i*80+Math.random()*400,
    wFrame:0,wTick:0,bPhase:i*0.72,bY:0,facing:1,waypoints:[]};
});

// ══════════════════════════════
// SPRITE LOADING
// ══════════════════════════════
const FW=32,FH=32,DW=32,DH=32;
const SPRITES={};
agents.forEach(ag=>{
  const img=new Image();
  img.src=`assets/characters/agents/${ag.name}.png`;
  SPRITES[ag.name]=img;
});

const T={};
['1_Generic_32x32','2_LivingRoom_32x32','8_Gym_32x32','13_Conference_Hall_32x32',
 'Room_Builder_32x32','Room_Builder_Floors_32x32','Room_Builder_Walls_32x32',
 '5_Classroom_32x32','Room_Builder_3d_walls_32x32'].forEach(n=>{
  const img=new Image(); img.src=`assets/tiles/${n}.png`; T[n]=img;
});

// ══════════════════════════════
// LOG DATA
// ══════════════════════════════
const LOG_URL='https://raw.githubusercontent.com/sssunwl/AIofficeSuni/main/office_log.json';
let logData=[],activeName=null;
async function fetchLog(){
  try{
    const r=await fetch(LOG_URL+'?t='+Date.now());
    logData=await r.json();
    document.getElementById('ft').textContent='LAST UPDATE: '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){}
}

// ══════════════════════════════
// MAP RENDERING
// ══════════════════════════════
let staticMapCanvas=null;

function buildStaticMap(){
  const sc=document.createElement('canvas');
  sc.width=CW; sc.height=CH;
  const sx=sc.getContext('2d');
  sx.imageSmoothingEnabled=false;

  // background
  sx.fillStyle='#0A0A12'; sx.fillRect(0,0,CW,CH);

  const FL=T['Room_Builder_Floors_32x32'],WL=T['Room_Builder_Walls_32x32'];

  // ft=[floorTileX,Y], wt=[wallTileX,Y]; null=dark/no tile
  const ZD={
    gym:    {ft:null,    wt:null},
    conf:   {ft:[10,1],  wt:[22,6]},
    lounge: {ft:[4,7],   wt:[11,4]},
    office: {ft:[1,1],   wt:[0,4]},
    cafe:   {ft:[4,1],   wt:[11,0]},
    kitchen:{ft:[4,4],   wt:[11,2]},
    snack:  {ft:[7,1],   wt:[0,4]},
    game:   {ft:[1,7],   wt:[0,10]},
    theater:{ft:null,    wt:null},
    souling:{ft:null,    wt:[22,2]},
    consult:{ft:[10,4],  wt:[22,4]},
    aroma:  {ft:[7,4],   wt:[11,10]},
    zen:    {ft:[10,7],  wt:[22,16]},
    meditate:{ft:null,   wt:null},
    ceo:    {ft:null,    wt:null},
    studio: {ft:null,    wt:null},
    corridor:{ft:null,  wt:null},
  };

  for(const[k,z] of Object.entries(Z)){
    const d=ZD[k]||{};
    const wallH=z.h<=3?1:2;

    sx.fillStyle=z.floor; sx.fillRect(z.x*TS,z.y*TS,z.w*TS,z.h*TS);

    if(d.ft&&FL&&FL.complete&&FL.naturalWidth){
      for(let r=z.y+wallH;r<z.y+z.h;r++)
        for(let c=z.x;c<z.x+z.w;c++)
          sx.drawImage(FL,d.ft[0]*TS,d.ft[1]*TS,TS,TS,c*TS,r*TS,TS,TS);
    }
    if(d.ft){
      const hx=parseInt(z.floor.slice(1),16);
      sx.fillStyle=`rgb(${((hx>>16&255)*.68)|0},${((hx>>8&255)*.68)|0},${((hx&255)*.68)|0})`;
      sx.fillRect(z.x*TS,z.y*TS,z.w*TS,wallH*TS);
    }
    if(d.wt&&WL&&WL.complete&&WL.naturalWidth)
      for(let r=z.y;r<z.y+wallH;r++)
        for(let c=z.x;c<z.x+z.w;c++)
          sx.drawImage(WL,d.wt[0]*TS,d.wt[1]*TS,TS,TS,c*TS,r*TS,TS,TS);
    if(d.ft){
      const hx=parseInt(z.floor.slice(1),16);
      const ledge=wallH<=1?6:11;
      sx.fillStyle=`rgb(${((hx>>16&255)*.42)|0},${((hx>>8&255)*.42)|0},${((hx&255)*.42)|0})`;
      sx.fillRect(z.x*TS,(z.y+wallH)*TS,z.w*TS,ledge);
      sx.fillStyle='rgba(0,0,0,.3)';
      sx.fillRect(z.x*TS,(z.y+wallH)*TS+ledge,z.w*TS,3);
    }
  }

  // grid
  sx.strokeStyle='rgba(0,0,0,.06)'; sx.lineWidth=1;
  for(const[k,z] of Object.entries(Z)){
    if(!ZD[k]||!ZD[k].ft) continue;
    const wallH=z.h<=3?1:2;
    for(let ty=z.y+wallH;ty<z.y+z.h;ty++)
      for(let tx=z.x;tx<z.x+z.w;tx++)
        sx.strokeRect(tx*TS+.5,ty*TS+.5,TS-1,TS-1);
  }

  // corridor (x:8-11, y:16-30) — drawn as zone (already covered by Z loop)
  // extra grid lines + ambient strips
  sx.strokeStyle='rgba(40,50,80,0.5)'; sx.lineWidth=1;
  for(let r=12;r<28;r++) for(let c=8;c<12;c++) sx.strokeRect(c*TS+.5,r*TS+.5,TS-1,TS-1);
  for(let r=12;r<28;r+=3){
    sx.fillStyle='rgba(200,149,106,0.08)';
    sx.fillRect(8*TS,r*TS+12,4*TS,8);
  }
  sx.save(); sx.translate(10*TS,20*TS); sx.rotate(-Math.PI/2);
  sx.font='bold 7px monospace'; sx.textAlign='center'; sx.fillStyle='rgba(100,120,160,0.4)';
  sx.fillText('— CORRIDOR —',0,3);
  sx.restore();

  // ── door gap helpers ──
  // horizontal door: gap in a horizontal wall at pixel y, centered on cx
  function doorH(wallY,cx){
    sx.fillStyle='#0A0A12'; sx.fillRect(cx-16,wallY-1,32,4); // clear wall
    sx.fillStyle='rgba(90,55,25,.9)'; sx.fillRect(cx-15,wallY-2,30,2);
    sx.fillStyle='#2A1808'; sx.fillRect(cx-13,wallY,26,2);
  }
  // vertical door: gap in a vertical wall at pixel x, centered on cy
  function doorV(wallX,cy){
    sx.fillStyle='#0A0A12'; sx.fillRect(wallX-1,cy-16,4,32); // clear wall
    sx.fillStyle='rgba(90,55,25,.9)'; sx.fillRect(wallX-2,cy-15,2,30);
    sx.fillStyle='#2A1808'; sx.fillRect(wallX,cy-13,2,26);
  }

  // zone borders
  sx.fillStyle='#0A0A12';
  sx.fillRect(7*TS-1,0,2,4*TS);              // gym|conf
  sx.fillRect(14*TS-1,0,2,4*TS);             // conf|lounge
  sx.fillRect(0,4*TS-1,CW,2);                // top rows|office
  sx.fillRect(0,12*TS-1,CW,2);               // office|CEO+corridor+SS
  // corridor vertical walls (y:12 to y:28 = 16 tiles)
  sx.fillRect(8*TS-1,12*TS,2,16*TS);         // left rooms|corridor
  sx.fillRect(12*TS-1,12*TS,2,16*TS);        // corridor|right rooms
  // left room horizontal dividers (x:0-7 only; CEO|Café then 3 more)
  sx.fillRect(0,16*TS-1,8*TS,2);             // CEO|Café
  [19,22,25].forEach(ty=>sx.fillRect(0,ty*TS-1,8*TS,2));
  // right room horizontal dividers (x:12-19 only)
  sx.fillRect(12*TS,16*TS-1,8*TS,2);         // SS|Souling
  [19,22,25].forEach(ty=>sx.fillRect(12*TS,ty*TS-1,8*TS,2));
  // bottom row — full-width wall (corridor ends, theater+meditation begin)
  sx.fillRect(0,28*TS-1,CW,2);
  sx.fillRect(10*TS-1,28*TS,2,3*TS);         // theater|meditation vertical divider

  // ── door gaps ──
  // office → CEO / corridor top / SS (wall at y:12)
  doorH(12*TS,3.5*TS);    // office→CEO center (x=112)
  doorH(12*TS,9.5*TS);    // office→corridor top (x=304)
  doorH(12*TS,15.5*TS);   // office→SS center (x=496)
  // CEO ↔ corridor and corridor ↔ SS (vertical walls x:8 and x:12, CEO/SS row)
  doorV(8*TS,14*TS);      // CEO side door into corridor
  doorV(12*TS,14*TS);     // SS side door from corridor
  // CEO→Café, SS→Souling (horizontal walls at y:16, sides only)
  doorH(16*TS,3.5*TS);    // CEO→Café (x=112)
  doorH(16*TS,15.5*TS);   // SS→Souling (x=496)
  // left rooms ↔ corridor (vertical wall x:8, rows y:16 to y:25)
  [16,19,22,25].forEach(ry=>doorV(8*TS,(ry+1.5)*TS));
  // corridor ↔ right rooms (vertical wall x:12, rows y:16 to y:25)
  [16,19,22,25].forEach(ry=>doorV(12*TS,(ry+1.5)*TS));

// CHARACTER RENDERING
// ══════════════════════════════
function drawAgent(ag,hl){
  const x=Math.round(ag.x),y=Math.round(ag.y+ag.bY);
  const img=SPRITES[ag.name];

  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(x,y+2,8,3,0,0,Math.PI*2); ctx.fill();

  if(hl){
    ctx.strokeStyle='#C8956A'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(x,y+2,11,5,0,0,Math.PI*2); ctx.stroke();
  }

  if(img&&img.complete&&img.naturalWidth>0){
    const isWalk=ag.state==='walking';
    const sy=0;
    const frameIdx=isWalk?Math.floor(Date.now()/200)%2:0;
    const spx=frameIdx*FW;
    const drawX=x-DW/2, drawY=y-DH+4;
    if(ag.facing===-1){
      ctx.save(); ctx.translate(drawX+DW,drawY); ctx.scale(-1,1);
      ctx.drawImage(img,spx,sy,FW,FH,0,0,DW,DH); ctx.restore();
    } else {
      ctx.drawImage(img,spx,sy,FW,FH,drawX,drawY,DW,DH);
    }
  } else {
    const wf=ag.state==='walking'&&ag.wFrame===1;
    ctx.fillStyle=ag.hair; ctx.fillRect(x-7,y-46,14,11);
    ctx.fillStyle=ag.skin; ctx.fillRect(x-7,y-35,14,14);
    ctx.fillStyle='#14141E'; ctx.fillRect(x-4,y-29,3,3); ctx.fillRect(x+1,y-29,3,3);
    ctx.fillStyle=ag.top; ctx.fillRect(x-8,y-21,16,16); ctx.fillRect(x-12,y-21,4,10); ctx.fillRect(x+8,y-21,4,10);
    ctx.fillStyle=ag.bot;
    const l=wf?3:0,r=wf?0:3;
    ctx.fillRect(x-7,y-5+l,6,11); ctx.fillRect(x+1,y-5+r,6,11);
  }

  ctx.font='bold 8px monospace'; ctx.textAlign='center';
  const lw=ctx.measureText(ag.name).width;
  ctx.fillStyle=hl?'rgba(13,17,23,.92)':'rgba(13,17,23,.75)';
  ctx.fillRect(x-lw/2-4,y-DH-10,lw+8,12);
  ctx.fillStyle=hl?'#C8956A':'#C8C0B0';
  ctx.fillText(ag.name,x,y-DH);
}

// ══════════════════════════════
// ROUTING — prevent wall-crossing
// ══════════════════════════════
const SECT={
  gym:'T',conf:'T',lounge:'T',
  office:'O',
  ceo:'C',studio:'C',
  corridor:'R',
  cafe:'L',kitchen:'L',snack:'L',game:'L',theater:'L',
  souling:'G',consult:'G',aroma:'G',zen:'G',meditate:'G',
};

function getZoneAt(px,py){
  const tx=Math.max(0,Math.min(TW-1,Math.floor(px/TS)));
  const ty=Math.max(0,Math.min(TH-1,Math.floor(py/TS)));
  return zoneMap[ty][tx];
}

// Returns waypoints so agents route through doors, never through walls
function getWaypoints(fromZone,toZone,toX,toY){
  const fs=SECT[fromZone]||'O';
  const ts=SECT[toZone]||'O';
  if(fs===ts) return [];

  const pts=[];
  const CX=10*TS; // corridor center X
  const mY=z=>((Z[z]?.y||0)+1.5)*TS; // row center Y for a zone

  // L ↔ G  (must cross corridor)
  if((fs==='L'||fs==='G')&&(ts==='L'||ts==='G')){
    const fY=mY(fromZone), tY=mY(toZone);
    // exit source side into corridor
    if(fs==='L') pts.push({x:7.5*TS,y:fY},{x:CX,y:fY});
    else         pts.push({x:12.5*TS,y:fY},{x:CX,y:fY});
    // move along corridor to target row
    if(Math.abs(fY-tY)>TS/2) pts.push({x:CX,y:tY});
    // enter target side
    if(ts==='L') pts.push({x:7.5*TS,y:tY});
    else         pts.push({x:12.5*TS,y:tY});
    return pts;
  }
  // L ↔ R  (left room ↔ corridor)
  if(fs==='L'&&ts==='R'){ pts.push({x:7.5*TS,y:mY(fromZone)}); return pts; }
  if(fs==='R'&&ts==='L'){ const tY=mY(toZone); pts.push({x:CX,y:tY},{x:7.5*TS,y:tY}); return pts; }
  // G ↔ R  (right room ↔ corridor)
  if(fs==='G'&&ts==='R'){ pts.push({x:12.5*TS,y:mY(fromZone)}); return pts; }
  if(fs==='R'&&ts==='G'){ const tY=mY(toZone); pts.push({x:CX,y:tY},{x:12.5*TS,y:tY}); return pts; }

  // O/T ↔ L  (office/top ↔ left rooms, via CEO row → y:16 door)
  if((fs==='O'||fs==='T')&&ts==='L'){ pts.push({x:4*TS,y:14*TS},{x:4*TS,y:16*TS+24}); return pts; }
  if(fs==='L'&&(ts==='O'||ts==='T')){ pts.push({x:4*TS,y:15*TS+8},{x:4*TS,y:11*TS+16}); return pts; }
  // O/T ↔ G  (office/top ↔ right rooms, via SS row → y:16 door)
  if((fs==='O'||fs==='T')&&ts==='G'){ pts.push({x:16*TS,y:14*TS},{x:16*TS,y:16*TS+24}); return pts; }
  if(fs==='G'&&(ts==='O'||ts==='T')){ pts.push({x:16*TS,y:15*TS+8},{x:16*TS,y:11*TS+16}); return pts; }
  // O/T ↔ R  (office/top ↔ corridor, through y:12 top opening)
  if((fs==='O'||fs==='T')&&ts==='R'){ pts.push({x:CX,y:13*TS}); return pts; }
  if(fs==='R'&&(ts==='O'||ts==='T')){ pts.push({x:CX,y:11*TS+20}); return pts; }

  // C ↔ O/T  (CEO/SS ↔ office: direct through y:12 wall, no extra waypoints)
  if(fs==='C'&&(ts==='O'||ts==='T')) return [];
  if((fs==='O'||fs==='T')&&ts==='C') return [];
  // C ↔ R  (CEO/SS ↔ corridor: through side door at CEO/SS row)
  if(fs==='C'&&ts==='R'){
    if(fromZone==='ceo') pts.push({x:7.5*TS,y:14*TS},{x:CX,y:14*TS});
    else                 pts.push({x:12.5*TS,y:14*TS},{x:CX,y:14*TS});
    return pts;
  }
  if(fs==='R'&&ts==='C'){
    if(toZone==='ceo')  pts.push({x:CX,y:14*TS},{x:7.5*TS,y:14*TS});
    else                pts.push({x:CX,y:14*TS},{x:12.5*TS,y:14*TS});
    return pts;
  }
  // C ↔ L  (CEO→Café direct; SS→left via corridor)
  if(fs==='C'&&ts==='L'){
    if(fromZone==='ceo'){ pts.push({x:4*TS,y:15*TS+24}); }
    else { const tY=mY(toZone); pts.push({x:12.5*TS,y:14*TS},{x:CX,y:14*TS},{x:CX,y:tY},{x:7.5*TS,y:tY}); }
    return pts;
  }
  if(fs==='L'&&ts==='C'){
    if(toZone==='ceo'){ pts.push({x:4*TS,y:15*TS+8}); }
    else { const fY=mY(fromZone); pts.push({x:7.5*TS,y:fY},{x:CX,y:fY},{x:CX,y:14*TS},{x:12.5*TS,y:14*TS}); }
    return pts;
  }
  // C ↔ G  (SS→Souling direct; CEO→right via corridor)
  if(fs==='C'&&ts==='G'){
    if(fromZone==='studio'){ pts.push({x:16*TS,y:15*TS+24}); }
    else { const tY=mY(toZone); pts.push({x:7.5*TS,y:14*TS},{x:CX,y:14*TS},{x:CX,y:tY},{x:12.5*TS,y:tY}); }
    return pts;
  }
  if(fs==='G'&&ts==='C'){
    if(toZone==='studio'){ pts.push({x:16*TS,y:15*TS+8}); }
    else { const fY=mY(fromZone); pts.push({x:12.5*TS,y:fY},{x:CX,y:fY},{x:CX,y:14*TS},{x:7.5*TS,y:14*TS}); }
    return pts;
  }

  return [];
}

// ══════════════════════════════
// AGENT AI
// ══════════════════════════════
const SPD=1.3;
function tickAgent(ag){
  if(ag.state==='idle'){
    ag.bY=Math.sin(Date.now()/480+ag.bPhase)*1.8;
    if(--ag.idleT<=0) setTarget(ag);
  } else {
    ag.bY=0;
    // advance to next waypoint first
    if(ag.waypoints.length>0){
      const wp=ag.waypoints[0];
      const dx=wp.x-ag.x, dy=wp.y-ag.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<SPD+2){
        ag.x=wp.x; ag.y=wp.y;
        ag.waypoints.shift();
      } else {
        ag.x+=dx/d*SPD; ag.y+=dy/d*SPD; ag.facing=dx>0?1:-1;
      }
    } else {
      const dx=ag.tx-ag.x,dy=ag.ty-ag.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<SPD){
        ag.x=ag.tx; ag.y=ag.ty; ag.state='idle'; ag.idleT=500+Math.random()*700;
      } else {
        ag.x+=dx/d*SPD; ag.y+=dy/d*SPD; ag.facing=dx>0?1:-1;
      }
    }
    if(++ag.wTick%13===0) ag.wFrame^=1;
  }
}

function setTarget(ag){
  let p;
  if(ag.home&&Math.random()<0.85){
    p={x:ag.home[0]*TS+TS/2, y:ag.home[1]*TS+TS*.8};
  } else {
    const pool=Math.random()<0.88?ag.prefer:ag.wander;
    const zone=pool[Math.floor(Math.random()*pool.length)];
    p=rndInZone(zone);
  }
  const fromZone=getZoneAt(ag.x,ag.y)||'office';
  const toZone=getZoneAt(p.x,p.y)||'office';
  ag.waypoints=getWaypoints(fromZone,toZone,p.x,p.y);
  ag.tx=p.x; ag.ty=p.y; ag.state='walking'; ag.wFrame=0; ag.wTick=0;
}

// ══════════════════════════════
// CLICK & HOVER
// ══════════════════════════════
function hitTest(mx,my){
  for(const ag of agents){
    const dx=mx-ag.x,dy=my-(ag.y+ag.bY);
    if(Math.abs(dx)<DW/2&&dy>-DH&&dy<6) return ag;
  }
  return null;
}
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const ag=hitTest((e.clientX-r.left)/SCALE,(e.clientY-r.top)/SCALE);
  if(ag) openPanel(ag);
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  canvas.style.cursor=hitTest((e.clientX-r.left)/SCALE,(e.clientY-r.top)/SCALE)?'pointer':'default';
});

// ══════════════════════════════
// PANEL
// ══════════════════════════════
function openPanel(ag){
  activeName=ag.name;
  document.getElementById('pem').textContent=ag.emoji;
  document.getElementById('pnm').textContent=ag.name;
  document.getElementById('prl').textContent=ag.role+' · '+ag.kw;
  const convs=logData.filter(e=>e.participants&&e.participants.includes(ag.name));
  const pb=document.getElementById('pb');
  if(!convs.length){
    pb.innerHTML=`<div class="empty">${ag.emoji}<br><br>${ag.name} 還沒有對話記錄。</div>`;
  } else {
    pb.innerHTML=convs.map(e=>{
      const other=e.participants.find(n=>n!==ag.name)||'';
      const odef=ADEFS.find(a=>a.name===other)||{emoji:'👤'};
      const dt=new Date(e.time);
      const ds=dt.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
      const ts=dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      const turns=(e.turns||[]).map(t=>`
        <div class="turn">
          <div class="tn ${t.agent===ag.name?'s':''}">${t.agent}</div>
          <div class="tt">${esc(t.text)}</div>
        </div>`).join('');
      return`<div class="cv">
        <div class="cv-m"><span class="cv-w">${odef.emoji} 與 ${other}</span><span>${ds} ${ts}</span></div>
        ${turns}</div>`;
    }).join('');
  }
  document.getElementById('panel').classList.add('open');
  document.getElementById('ov').classList.add('show');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('ov').classList.remove('show');
  activeName=null;
}
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════
// GAME LOOP
// ══════════════════════════════
function loop(){
  if(staticMapCanvas) ctx.drawImage(staticMapCanvas,0,0);
  agents.forEach(tickAgent);
  [...agents].sort((a,b)=>a.y-b.y).forEach(ag=>drawAgent(ag,ag.name===activeName));
  requestAnimationFrame(loop);
}

let SCALE=1;
function scaleToFit(){
  SCALE=Math.min(1,(window.innerWidth-8)/CW);
  const wrap=document.getElementById('wrap');
  wrap.style.transform=SCALE<1?`scale(${SCALE})`:'';
  wrap.style.marginBottom=SCALE<1?Math.round(CH*SCALE-CH)+'px':'12px';
  wrap.style.marginRight=SCALE<1?Math.round(CW*SCALE-CW)+'px':'';
}
window.addEventListener('resize',scaleToFit);
scaleToFit();

buildStaticMap();
fetchLog();
setInterval(fetchLog,5*60*1000);
loop();
Promise.all(Object.values(T).map(img=>new Promise(r=>{img.onload=r;img.onerror=r;}))).then(buildStaticMap);
</script>
